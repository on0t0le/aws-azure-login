name: Main

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: lib
          path: lib

  tag:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Bump version and push tag
        id: tag
        uses: anothrNick/github-tag-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
      - name: Save tag to artifact
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: echo "$NEW_TAG" > tag.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tag_name
          path: tag.txt

  publish-npm:
    needs: tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: lib
          path: lib
      - uses: actions/download-artifact@v4
        with:
          name: tag_name
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Set version from tag
        run: |
          TAG=$(cat tag.txt)
          npm version "${TAG#v}" --no-git-tag-version
      - run: npm publish --provenance --access public
